    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Open Sans', sans-serif; }
        
        .container { display: flex; height: 100vh; width: 100%; overflow: hidden; }
        
        .side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            transition: all 0.5s ease;
            text-decoration: none;
            position: relative;
            color: white;
        }

        /* Sekce pro Šafrán */
        .safran { 
            background: linear-gradient(#5b25b3f2, #5b25b3f2), 
                        url('images/safran/spolecna_skola.jpg') center/cover; 
        }

        /* Sekce pro Valášek */
        .valasek { 
            background: linear-gradient(#ab0000, #ab0000), 
                        url('images/valasek/spolecna.jpg') center/cover; 
        }

        .side:hover { flex: 1.2; filter: brightness(1.1); }
        .side h2 { font-family: 'Alegreya', serif; font-size: 3rem; margin: 20px 0; }
        .side img { max-width: 200px; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        
        .btn {
            padding: 12px 30px;
            border: 2px solid white;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .side:hover .btn { background: white; color: #111; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .side h2 { font-size: 2rem; }
        }
    </style>
